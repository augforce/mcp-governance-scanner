<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MCP Security Scanner{% endblock %}</title>
  <style>
    :root { --accent: #1a5fb4; --fail: #a51d2d; --ok: #26a269; --warn: #c64600; }
    body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 60rem;
           margin: 2rem auto; padding: 0 1rem; color: #1c1c1c; line-height: 1.5; }
    header { display: flex; align-items: baseline; gap: 1.5rem; border-bottom: 2px solid var(--accent);
             padding-bottom: .5rem; margin-bottom: 1.5rem; }
    header h1 { font-size: 1.2rem; margin: 0; }
    header a { color: var(--accent); text-decoration: none; }
    form.scan { display: grid; gap: .6rem; max-width: 34rem; margin-bottom: 2rem; }
    input[type=text] { padding: .45rem; border: 1px solid #bbb; border-radius: 4px; font-size: .95rem; }
    button { padding: .5rem 1rem; background: var(--accent); color: #fff; border: 0;
             border-radius: 4px; cursor: pointer; font-size: .95rem; width: fit-content; }
    button:disabled { background: #9db8d6; cursor: not-allowed; }
    .folder-btn { display: inline-block; width: fit-content; padding: .5rem 1rem;
                  background: #eef3fb; border: 1px solid var(--accent); color: var(--accent);
                  border-radius: 4px; cursor: pointer; font-size: .95rem; font-weight: 600; }
    .folder-btn input { display: none; }
    .picked { color: #555; font-size: .9rem; margin: .2rem 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: .45rem .6rem; border-bottom: 1px solid #ddd; }
    .verdict { font-weight: 600; }
    .verdict-Fail { color: var(--fail); }
    .verdict-Approved { color: var(--ok); }
    .verdict-Approved.with.Conditions, .verdict-conditions { color: var(--warn); }
    pre.report { background: #f6f6f4; border: 1px solid #ddd; border-radius: 6px;
                 padding: 1rem; white-space: pre-wrap; overflow-x: auto; font-size: .85rem; }
    .error { color: var(--fail); font-weight: 600; }
    .narrative { border-left: 4px solid var(--accent); padding: .25rem 1rem; background: #f2f6fb; }
  </style>
</head>
<body>
  <header>
    <h1>MCP Server Security &amp; Governance Scanner</h1>
    <nav><a href="/">New scan</a> · <a href="/history">History</a></nav>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
